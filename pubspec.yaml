name: voice_expense_app
description: A voice-based expense tracker

publish_to: 'none'

environment:
  sdk: "^3.11.0"

dependencies:
  flutter:
    sdk: flutter
  speech_to_text: ^7.0.0
  sqflite: ^2.4.0
  path_provider: ^2.1.2
  permission_handler: ^11.3.0
  intl: ^0.19.0
  share_plus: ^10.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: "assets/app_icon_white_bg.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/app_icon.png"

flutter:
  uses-material-design: true
